# This file is a template: $PORT is substituted at container startup by the
# nginx Docker image's entrypoint (envsubst) because it is copied to
# /etc/nginx/templates/default.conf.template in the Dockerfile.
server {
    listen       $PORT;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Serve static assets with long-lived cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback – every unknown path returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
